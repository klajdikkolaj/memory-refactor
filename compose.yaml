name: memory-refactor

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: memory_refactor
      POSTGRES_USER: memory_refactor
      POSTGRES_PASSWORD: memory_refactor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_refactor -d memory_refactor"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: memory_refactor
      POSTGRES_PWD: memory_refactor
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

  qdrant:
    image: qdrant/qdrant:v1.12.1
    profiles: ["future"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  nats:
    image: nats:2.10
    profiles: ["future"]
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres-data:
  qdrant-data:
